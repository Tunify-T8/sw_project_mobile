name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  sync:
    name: Sync to Monorepo
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mobile repo
        uses: actions/checkout@v4
        with:
          path: mobile-source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: Tunify-T8/Sound_Cloud_Clone-Team8
          token: ${{ secrets.MONOREPO_PAT }}
          path: monorepo

      - name: Sync mobile into monorepo
        run: |
          rm -rf monorepo/mobile
          rsync -av --exclude='.git' mobile-source/ monorepo/mobile/

      - name: Commit and push to monorepo
        run: |
          cd monorepo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/
          git diff --cached --quiet || git commit -m "Sync mobile from ${{ github.sha }}"
          git push
